[build]
  command = "npm run build"
  publish = "out"
  node_version = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  functions = "netlify/functions"
  publish = "out"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "RECAPTCHA_SECRET_KEY,NEXT_PUBLIC_RECAPTCHA_SITE_KEY"

